<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tempo Calendar</title>
    <meta name="description" content="A calendar that schedules itself. Tasks find their own time on your Google Calendar." />
    <meta name="theme-color" content="#f5efe6" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!--
      Typography stack:
        - Fraunces (display, headings, editorial moments) — variable, optical sizing
        - Instrument Sans (body, UI, buttons) — humanist, warm, refined
        - Instrument Serif (occasional italic flourishes) — editorial accent
        - IBM Plex Mono (timestamps, numbers, code) — designed, not techy
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,300..900,0..100,0..1;1,9..144,300..900,0..100,0..1&family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        color-scheme: light;
      }
      html {
        font-family: 'Instrument Sans', ui-sans-serif, system-ui, -apple-system, sans-serif;
        font-feature-settings: "ss01", "cv11", "cv02";
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      .display {
        font-family: 'Fraunces', ui-serif, Georgia, serif;
        font-variation-settings: "opsz" 144, "SOFT" 30, "WONK" 0;
        letter-spacing: -0.025em;
      }
      .display-italic {
        font-family: 'Fraunces', ui-serif, Georgia, serif;
        font-style: italic;
        font-variation-settings: "opsz" 144, "SOFT" 80, "WONK" 1;
        letter-spacing: -0.02em;
      }
      .mono {
        font-family: 'IBM Plex Mono', ui-monospace, 'SF Mono', monospace;
        font-feature-settings: "ss01", "zero", "tnum";
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
